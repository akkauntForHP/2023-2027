  <script>
    (function () {
        let blocked = false;
        function detectDevTools() {
            const widthDiff = window.outerWidth - window.innerWidth;
            const heightDiff = window.outerHeight - window.innerHeight;
    
            if ((widthDiff > 160 || heightDiff > 160) && !blocked) {
                blocked = true;
                blockSite();
            }
        }
    
        function blockSite() {
            document.body.innerHTML = `
                <div style="
                    display:flex;
                    justify-content:center;
                    align-items:center;
                    height:100vh;
                    background:#000;
                    color:#ff4d4d;
                    font-size:32px;
                    text-align:center;
                ">
                    ⚠️ Developer Tools aniqlanib sayt kodi bloklandi!
                </div>
            `;
        }
    
        setInterval(detectDevTools, 500);
    
    })();

    </script>

              e.key === "F12"
          ) {
              e.preventDefault();
              return false;
          }
      });
      </script>

  <link rel="icon" href="favicon.ico">
  
  <style>
    :root {
      --primary: #6a1b9a;
      --text: #1a0b2e;
      --glass: rgba(255, 255, 255, 0.16);
      --glass-border: rgba(255, 255, 255, 0.28);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      color: white;
      background: linear-gradient(135deg, #5e35b1 0%, #7e57c2 50%, #ab47bc 100%);
      overflow-x: hidden;
      position: relative;
    }

    .bg-shapes {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }
    .shape {
      position: absolute;
      border-radius: 50%;
      background: linear-gradient(45deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
      backdrop-filter: blur(3px);
      animation: float 28s infinite ease-in-out;
    }
    .shape1 { width:340px; height:340px; top:5%; left:5%; animation-delay:0s; }
    .shape2 { width:260px; height:260px; top:60%; right:10%; animation-delay:9s; }
    .shape3 { width:200px; height:200px; bottom:12%; left:18%; animation-delay:17s; }
    @keyframes float {
      0%,100% { transform: translate(0,0) rotate(0deg); }
      25% { transform: translate(80px, -50px) rotate(12deg); }
      50% { transform: translate(-40px, 60px) rotate(-18deg); }
      75% { transform: translate(50px, -40px) rotate(8deg); }
    }

    .container { max-width: 1480px; margin: 30px auto; padding: 0 15px; }
    h1 {
      text-align: center;
      font-size: 2.6rem;
      margin-bottom: 20px;
      text-shadow: 0 4px 14px rgba(0,0,0,0.5);
    }

    .year-header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 50px;
      margin: 25px 0 45px;
    }
    .year-header h2 {
      font-size: 3.6rem;
      margin: 0;
      text-shadow: 0 4px 12px rgba(0,0,0,0.5);
    }
    .arrow {
  width: 70px;
  height: 66.5px;
  font-size: 2.5rem;
  cursor: pointer;
  color: white;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 50%;
  background: rgba(255,255,255,0.14);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  transition: all 0.3s;
}

.arrow:hover {
  background: rgba(255,255,255,0.28);
  transform: scale(1.08);
}

    .months-wrapper { display: flex; flex-direction: column; gap: 45px; }
    .months-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 20px;
    }

    .month-card {
      background: var(--glass);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 35px rgba(0,0,0,0.28);
      transition: all 0.3s;
    }
    .month-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 18px 50px rgba(0,0,0,0.38);
    }

    .month-title {
      padding: 10px;
      font-size: 1.2rem;
      font-weight: 600;
      text-align: center;
      background: rgba(0,0,0,0.18);
      color: white;
    }

    table { width: 100%; border-collapse: collapse; }
    th, td {
      text-align: center;
      padding: 4px 2px;
      font-size: 0.84rem;
      color: white;
    }
    th { background: rgba(0,0,0,0.20); font-weight: 600; }

    .day-cell {
      position: relative;
      cursor: pointer;
      height: 30px;
    }
    .day-number {
      display: inline-block;
      width: 20px;
      height: 20px;
      line-height: 20px;
      border-radius: 50%;
      background: rgba(255,255,255,0.09);
      transition: all 0.22s;
      font-size: 0.9rem;
    }
    .day-cell:hover .day-number {
      background: rgba(255,255,255,0.30);
      transform: scale(1.14);
    }

    .birthday-boy  { background: #42a5f5 !important; color:#0d47a1; font-weight:700; box-shadow: 0 0 12px #42a5f5aa; }
    .birthday-girl { background: #ec407a !important; color:#880e4f; font-weight:700; box-shadow: 0 0 12px #ec407aaa; }

    /* Modal */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: var(--glass);
      backdrop-filter: blur(18px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 28px 32px;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 15px 50px rgba(0,0,0,0.5);
      color: white;
      animation: pop 0.3s ease-out;
    }
    @keyframes pop {
      0% { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .modal-name { font-size: 1.55rem; font-weight: 700; margin-bottom: 12px; color: #e1bee7; }
    .modal-date { font-size: 1.15rem; opacity: 0.95; }
    .close-btn {
      margin-top: 20px;
      padding: 10px 24px;
      background: rgba(255,255,255,0.22);
      border: none;
      border-radius: 30px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .close-btn:hover { background: rgba(255,255,255,0.38); }

    @media (max-width: 1200px) { .months-row { grid-template-columns: repeat(4, 1fr); gap: 18px; } }
    @media (max-width: 900px)  { .months-row { grid-template-columns: repeat(3, 1fr); gap: 16px; } }
    @media (max-width: 600px)  { .months-row { grid-template-columns: repeat(2, 1fr); gap: 14px; } .year-header h2 { font-size: 2.8rem; } }

    #group-select {
      padding: 8px 12px;
      font-size: 1.2rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.15);
      color: white;
      backdrop-filter: blur(10px);
      outline: none;
    }
    #group-select option {
      background-color: #7e57c2; /* gradientga mos to‘q binafsha */
      color: white;
    }
    /* Effektni aniqroq qilish uchun */
    .day-number.glow-effect {
      animation: glow-pulse 1.5s ease-in-out infinite;
    }

    /* Ranglar uchun ham aniqroq qilish */
    @keyframes glow-pulse {
      0%   { transform: scale(1);    box-shadow: 0 0 8px rgba(255,255,255,0.6); }
      50%  { transform: scale(2.4);  box-shadow: 0 0 20px rgba(255,255,255,1); }
      100% { transform: scale(1);    box-shadow: 0 0 8px rgba(255,255,255,0.6); }
    }
  </style>
</head>

    function createMonthCard(m, year) {
      const card = document.createElement("div");
      card.className = "month-card";

      const title = document.createElement("div");
      title.className = "month-title";
      title.textContent = monthNames[m];
      card.appendChild(title);

      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const trHead = document.createElement("tr");
      weekdays.forEach(w => {
        const th = document.createElement("th");
        th.textContent = w;
        trHead.appendChild(th);
      });
      thead.appendChild(trHead);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");
      let firstDay = new Date(year, m, 1).getDay();
      firstDay = (firstDay + 6) % 7; // 0 = Dushanba
      const daysInMonth = new Date(year, m + 1, 0).getDate();

      let row = document.createElement("tr");
      for (let i = 0; i < firstDay; i++) row.appendChild(document.createElement("td"));

      for (let d = 1; d <= daysInMonth; d++) {
        const td = document.createElement("td");
        td.className = "day-cell";

        const span = document.createElement("span");
        span.className = "day-number";
        span.textContent = d;
        td.appendChild(span);

        if (year === todayYear && m + 1 === todayMonth && d === todayDay) {
          span.style.background = 'limegreen';  // yashil rang (o'zgartirsa bo'ladi)
          span.style.color = 'black';           // qora matn
          span.title = 'Bugun';                // hoverda
        }

        const found = getCurrentMembers().filter(p => {
          const [byear, bmo, bda] = p.date.split("-").map(Number);
          return bmo === m + 1 && bda === d && byear <= year;
        });

        if (found.length) {
          // Birinchi odamning rangini qo'llaymiz (agar bir nechta bo'lsa ham)
          const p = found[0];
          let hasGirl = false;
          let hasBoy = false;
          found.forEach(person => {
            if (person.isGirl) hasGirl = true;
            else hasBoy = true;
          });

          if (hasGirl && hasBoy) {
            // Ikkala jins ham bo'lsa - gradient (chap pushti, o'ng ko'k)
            span.style.background = 'linear-gradient(to right, #ec407a 50%, #42a5f5 50%)';
            span.style.color = '#fff';  // Matn oq bo'lsin, ko'rinishi uchun
          } else if (hasGirl) {
            span.classList.add("birthday-girl");
          } else if (hasBoy) {
            span.classList.add("birthday-boy");
          }
          td.title = found.map(p => p.name).join(', ');  // Hoverda hamma ism chiqadi

          // Agar 2+ tug'ilgan kun bo'lsa, sana ustida kichik raqam chiqarish
          if (found.length > 1) {
            const countSup = document.createElement('sup');
            countSup.textContent = found.length;
            countSup.style.fontSize = '0.7em';
            countSup.style.color = 'yellow';
            countSup.style.position = 'absolute';
            countSup.style.top = '-4px';
            countSup.style.right = '-6px';
            span.style.position = 'relative';
            span.appendChild(countSup);
          }

          td.addEventListener("click", () => {

            modalName.innerHTML = "";
            modalDate.innerHTML = "";

            found.forEach((p, index) => {

              const birthParts = p.date.split("-");
              const birthYear  = parseInt(birthParts[0]);
              const birthMonth = parseInt(birthParts[1]);
              const birthDay   = parseInt(birthParts[2]);

              const realToday = new Date();
              const targetBdayThisYear = new Date(year, birthMonth - 1, birthDay);
              let age = year - birthYear;

              let yoshText = "";
              if (targetBdayThisYear <= realToday) {
                yoshText = `<strong>${age} yoshga to'lgan</strong>`;
              } else {
                yoshText = `<strong>${age} yoshga to'ladi</strong>`;
              }

              const birthDateObj = new Date(birthYear, birthMonth - 1, birthDay);
              const weekdaysUz = ["Yakshanba", "Dushanba", "Seshanba", "Chorshanba", "Payshanba", "Juma", "Shanba"];
              const tugilganHaftaKuni = weekdaysUz[birthDateObj.getDay()];

              const thisYearBdayObj = new Date(year, birthMonth - 1, birthDay);
              const thisYearHaftaKuni = weekdaysUz[thisYearBdayObj.getDay()];

              function getZodiac(month, day) {
                if ((month === 3 && day >= 21) || (month === 4 && day <= 20)) return "Qo'y ♈";
                if ((month === 4 && day >= 21) || (month === 5 && day <= 20)) return "Buzoq ♉";
                if ((month === 5 && day >= 21) || (month === 6 && day <= 21)) return "Egizaklar ♊";
                if ((month === 6 && day >= 22) || (month === 7 && day <= 22)) return "Qisqichbaqa ♋";
                if ((month === 7 && day >= 23) || (month === 8 && day <= 23)) return "Arslon ♌";
                if ((month === 8 && day >= 24) || (month === 9 && day <= 23)) return "Parizod ♍";
                if ((month === 9 && day >= 24) || (month === 10 && day <= 23)) return "Tarozi ♎";
                if ((month === 10 && day >= 24) || (month === 11 && day <= 22)) return "Chayon ♏";
                if ((month === 11 && day >= 23) || (month === 12 && day <= 21)) return "O'qotar ♐";
                if ((month === 12 && day >= 22) || (month === 1 && day <= 20)) return "Tog' echkisi ♑";
                if ((month === 1 && day >= 21) || (month === 2 && day <= 20)) return "Qovg'a ♒";
                if ((month === 2 && day >= 21) || (month === 3 && day <= 20)) return "Baliq ♓";
                return "Noma'lum";
              }

              const burj = getZodiac(birthMonth, birthDay);

              const targetBday = new Date(year, birthMonth - 1, birthDay);
              const diffMs = targetBday - realToday;
              let daysLeft = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

              let daysText = "";
              if (daysLeft > 0) {
                daysText = `Bu tug'ilgan kungacha: <strong>${daysLeft} kun</strong> qoldi ⏳`;
              } else if (daysLeft < 0) {
                daysText = `☹️Bu tug'ilgan kun bo'lib o'tganiga: <strong>${Math.abs(daysLeft)} kun</strong> bo'ldi`;
              } else {
                daysText = `Bugun tug'ilgan kuni!`;
              }


              modalDate.innerHTML += `
                <div style="margin-bottom:25px;">

                  <!-- ISM (oldingi pushti rang va razmer) -->
                  <div style="
                    font-size:1.55rem;
                    font-weight:700;
                    margin-bottom:12px;
                    color:#e1bee7;
                  ">
                    ${p.name}
                  </div>

                  <!-- MA'LUMOTLAR (modal-date style) -->
                  <div style="
                    font-size:1.15rem;
                    opacity:0.95;
                  ">
                  
                  <div style="margin:10px 0; font-size:1.2em;">
                    ${yoshText}
                  </div>
                  <div>
                    Tug'ilgan sana: <strong>${birthDay.toString().padStart(2, '0')}.${birthMonth.toString().padStart(2, '0')}.${birthYear}</strong><br>
                    <small>Asl hafta kuni: ${tugilganHaftaKuni}</small><br>
                    <small>Bu yilgi kuni: ${thisYearHaftaKuni}</small>
                  </div>
                  <div style="margin-top:12px;">
                    Burj: <strong>${burj}</strong>
                  </div>
                  <div style="margin-top:12px; font-size:1.05em;">
                    ${daysText}
                  </div>
                  ${index < found.length - 1 ? `
                    <div style="
                      height:1px;
                      background:rgba(255,255,255,0.25);
                      margin:18px 0;
                    "></div>
                  ` : ""}
                </div>
              `;
            });

            modal.style.display = "flex";
          });
      }
              

        row.appendChild(td);

        if ((firstDay + d) % 7 === 0 || d === daysInMonth) {
          tbody.appendChild(row);
          row = document.createElement("tr");
        }
      }
      table.appendChild(tbody);
      card.appendChild(table);
      return card;
    }

    function renderYear(year) {
      yearDisplay.textContent = year;
      wrapper.innerHTML = "";

      const row1 = document.createElement("div"); row1.className = "months-row";
      for (let m = 0; m < 6; m++) row1.appendChild(createMonthCard(m, year));

      const row2 = document.createElement("div"); row2.className = "months-row";
      for (let m = 6; m < 12; m++) row2.appendChild(createMonthCard(m, year));

      wrapper.append(row1, row2);
    }

    // Yangi: qidiruv input va natijalar
    const searchInput = document.getElementById("search-input");
    const searchResults = document.getElementById("search-results");

    // Qidiruv funksiyasi
    searchInput.addEventListener("input", (e) => {
      const query = e.target.value.toLowerCase().trim();
      searchResults.innerHTML = "";  // Natijalarni tozalash
      searchResults.style.display = "none";

      if (query.length < 2) return;  // Kamida 2 harf kiritilsa ishlaydi

      const currentMembers = getCurrentMembers();  // Joriy guruh yoki barchasi
      const matches = currentMembers.filter(p => p.name.toLowerCase().includes(query));

      if (matches.length === 0) return;

      // Eng yaqin 3 ta variantni chiqarish (sort bo'yicha yaqinlik bo'yicha, oddiyroq)
      matches.sort((a, b) => a.name.toLowerCase().indexOf(query) - b.name.toLowerCase().indexOf(query));
      const top3 = matches.slice(0, 3);

      searchResults.style.display = "block";
      top3.forEach(person => {
        const resultDiv = document.createElement("div");
        resultDiv.textContent = person.name;
        resultDiv.style.cursor = "pointer";
        resultDiv.style.padding = "8px";
        resultDiv.style.background = "rgba(255,255,255,0.15)";
        resultDiv.style.borderRadius = "8px";
        resultDiv.style.marginBottom = "5px";
        resultDiv.style.display = "inline-block";
        resultDiv.style.marginRight = "10px";

        resultDiv.addEventListener("click", () => {
        const [byear, bmonth, bday] = person.date.split("-").map(Number);

        // Kalendardagi barcha kun kataklarini topamiz
        const dayCells = document.querySelectorAll('.day-cell');

        dayCells.forEach(cell => {
          const span = cell.querySelector('.day-number');
          if (span) {
            const dayNum = parseInt(span.textContent.trim());

            // Oy nomi orqali oy indeksini topamiz
            const monthCard = cell.closest('.month-card');
            const monthTitle = monthCard.querySelector('.month-title').textContent;
            const monthIndex = monthNames.indexOf(monthTitle) + 1;

            // Agar kun va oy mos kelsa — effekt qo‘yamiz
            if (dayNum === bday && monthIndex === bmonth) {
              // Oldingi effektlarni tozalash
              document.querySelectorAll('.day-number.glow-effect').forEach(el => {
                el.classList.remove('glow-effect');
              });

              // Yangi effekt qo‘yish
              span.classList.add('glow-effect');

              // 5 sekunddan keyin effektni o‘chirish (takrorlanmasligi uchun)
              setTimeout(() => {
                span.classList.remove('glow-effect');
              }, 5000);

              // Kalendarni scroll qilish (oy ko‘rinishi uchun)
              monthCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          }
        });
      });

        searchResults.appendChild(resultDiv);
      });
    });

    document.getElementById("prev-year").onclick = () => { currentYear--; renderYear(currentYear); };
    document.getElementById("next-year").onclick = () => { currentYear++; renderYear(currentYear); };

    function closeModal() { modal.style.display = "none"; }
    modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });

    renderYear(currentYear);
  </script>
</body>
</html>
